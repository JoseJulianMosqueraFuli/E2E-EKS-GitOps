# Pre-commit hooks for the E2E-EKS-GitOps project
# Install with: pip install pre-commit && pre-commit install
# Scan for secrets baseline: detect-secrets scan > .secrets.baseline
# Audit baseline: detect-secrets audit .secrets.baseline

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  # Detect secrets (Yelp)
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            .secrets.baseline|
            .*\.test\..*|
            .*_test\.py|
          )$

  # Terraform formatting
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.86.0
    hooks:
      - id: terraform_fmt
        files: ^infra/.*\.tf$

  # Python formatting (optional, requires black to be installed)
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: system
        types: [python]
        pass_filenames: true
        stages: [commit]
