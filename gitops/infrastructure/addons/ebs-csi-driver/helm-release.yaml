apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: aws-ebs-csi-driver
  namespace: kube-system
  labels:
    app.kubernetes.io/name: aws-ebs-csi-driver
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: mlops-platform
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: aws-ebs-csi-driver
      version: "2.28.x"
      sourceRef:
        kind: HelmRepository
        name: aws-ebs-csi-driver
        namespace: flux-system
      interval: 1h
  releaseName: aws-ebs-csi-driver
  targetNamespace: kube-system
  install:
    createNamespace: true
  upgrade:
    crds: CreateReplace
  values:
    controller:
      replicaCount: ${ebs_replicas}
      serviceAccount:
        create: true
        name: ebs-csi-controller-sa
        annotations:
          eks.amazonaws.com/role-arn: ${ebs_irsa_role}
      resources:
        requests:
          cpu: ${ebs_cpu_request}
          memory: ${ebs_memory_request}
        limits:
          cpu: ${ebs_cpu_limit}
          memory: ${ebs_memory_limit}
    node:
      serviceAccount:
        create: true
        name: ebs-csi-node-sa
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    defaultStorageClass:
      enabled: true
      name: gp3
      reclaimPolicy: Delete
      volumeBindingMode: WaitForFirstConsumer
      parameters:
        type: gp3
        encrypted: "true"
        kmsKeyId: ${kms_key_id}
