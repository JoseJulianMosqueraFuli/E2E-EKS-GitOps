apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-controllers
  namespace: flux-system
spec:
  interval: 10m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: infrastructure-repo
  path: ./infrastructure/controllers
  prune: true
  wait: true
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: source-controller
      namespace: flux-system
    - apiVersion: apps/v1
      kind: Deployment
      name: kustomize-controller
      namespace: flux-system
    - apiVersion: apps/v1
      kind: Deployment
      name: helm-controller
      namespace: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-addons
  namespace: flux-system
spec:
  interval: 10m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: infrastructure-repo
  path: ./infrastructure/addons
  prune: true
  wait: true
  dependsOn:
    - name: infrastructure-controllers
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: aws-load-balancer-controller
      namespace: kube-system
    - apiVersion: apps/v1
      kind: Deployment
      name: ebs-csi-controller
      namespace: kube-system
    - apiVersion: apps/v1
      kind: Deployment
      name: cluster-autoscaler
      namespace: kube-system
  postBuild:
    substitute:
      cluster_name: "mlops-${environment}-cluster"
      region: "us-west-2"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-networking
  namespace: flux-system
spec:
  interval: 10m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: infrastructure-repo
  path: ./infrastructure/networking
  prune: true
  wait: true
  dependsOn:
    - name: infrastructure-addons
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: istiod
      namespace: istio-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-security
  namespace: flux-system
spec:
  interval: 10m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: infrastructure-repo
  path: ./infrastructure/security
  prune: true
  wait: true
  dependsOn:
    - name: infrastructure-controllers
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-base
  namespace: flux-system
spec:
  interval: 10m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: infrastructure-repo
  path: ./infrastructure/base
  prune: true
  wait: true
  dependsOn:
    - name: infrastructure-security
