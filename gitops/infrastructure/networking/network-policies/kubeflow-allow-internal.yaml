apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubeflow-allow-internal
  namespace: kubeflow
  labels:
    app.kubernetes.io/name: network-policy
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: mlops-platform
spec:
  podSelector:
    matchLabels:
      app: ml-pipeline
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mlflow
      ports:
        - protocol: TCP
          port: 8888
        - protocol: TCP
          port: 8887
