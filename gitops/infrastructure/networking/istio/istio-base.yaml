apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: istio-base
  namespace: istio-system
  labels:
    app.kubernetes.io/name: istio-base
    app.kubernetes.io/component: service-mesh
    app.kubernetes.io/part-of: mlops-platform
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: base
      version: "1.20.x"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
      interval: 1h
  releaseName: istio-base
  targetNamespace: istio-system
  install:
    createNamespace: true
