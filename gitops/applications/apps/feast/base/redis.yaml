# Feast Redis Online Store
# StatefulSet for persistence. In production, consider ElastiCache Redis.

---
apiVersion: v1
kind: Namespace
metadata:
  name: feast
  labels:
    app.kubernetes.io/name: feast
    app.kubernetes.io/component: feature-store

---
apiVersion: v1
kind: Service
metadata:
  name: feast-redis-master
  namespace: feast
  labels:
    app.kubernetes.io/name: feast-redis
    app.kubernetes.io/component: online-store
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app.kubernetes.io/name: feast-redis

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: feast-redis
  namespace: feast
  labels:
    app.kubernetes.io/name: feast-redis
    app.kubernetes.io/component: online-store
spec:
  serviceName: feast-redis-master
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: feast-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: feast-redis
        app.kubernetes.io/component: online-store
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
