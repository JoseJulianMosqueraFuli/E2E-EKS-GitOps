apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: feast

resources:
  - redis.yaml
  - feast-server.yaml

labels:
  - pairs:
      app.kubernetes.io/name: feast
      app.kubernetes.io/component: feature-store
      app.kubernetes.io/part-of: mlops-platform
    includeSelectors: false

images:
  - name: feastdev/feature-server
    newTag: 0.40.1
