apiVersion: v1
kind: ServiceAccount
metadata:
  name: mlflow
  namespace: mlflow
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/mlflow-irsa-role
# Disable automatic token mounting by default.
# Pods that need the token (e.g. for IRSA) must opt-in explicitly.
automountServiceAccountToken: false
