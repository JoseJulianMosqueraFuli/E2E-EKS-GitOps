apiVersion: v1
kind: Service
metadata:
  name: mlflow-postgresql
  namespace: mlflow
  labels:
    app: mlflow-postgresql
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/component: database
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
    app: mlflow-postgresql
