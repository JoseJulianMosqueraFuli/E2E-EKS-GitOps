apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - prometheus-statefulset.yaml
  - grafana-pvc.yaml
  - grafana-deployment.yaml
  - configmap.yaml
  - serviceaccount.yaml
  - alertmanager-config.yaml
  - argocd-notifications.yaml
  - mlops-alerts.yaml
  - prometheus-alerts.yaml
  - evidently-monitoring.yaml
  - drift-cronjob.yaml

configMapGenerator:
  - name: grafana-dashboards-config
    files:
      - dashboards/provider.yaml
  - name: grafana-dashboards
    files:
      - dashboards/ml-monitoring-dashboard.json
      - dashboards/mlflow-dashboard.json
      - dashboards/kserve-dashboard.json
      - dashboards/model-metrics-dashboard.json
      - dashboards/cost-monitoring-dashboard.json

generatorOptions:
  disableNameSuffixHash: true

labels:
  - pairs:
      app.kubernetes.io/name: monitoring
      app.kubernetes.io/component: observability
      app.kubernetes.io/part-of: mlops-platform
    includeSelectors: false
