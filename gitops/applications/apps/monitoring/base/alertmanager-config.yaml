apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: alerting
    app.kubernetes.io/part-of: mlops-platform
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      slack_api_url: "${SLACK_WEBHOOK_URL}"

    templates:
      - /etc/alertmanager/templates/*.tmpl

    route:
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'slack-notifications'
      routes:
        - match:
            severity: critical
          receiver: 'pagerduty-critical'
          continue: true
        - match:
            severity: warning
          receiver: 'slack-notifications'
          group_wait: 15s
        - match:
            category: ml_monitoring
          receiver: 'slack-mlops'
          group_wait: 30s
        - match:
            alertname: MLflowDown
          receiver: 'pagerduty-critical'
          repeat_interval: 10m
        - match:
            alertname: KServeHighErrorRate
          receiver: 'pagerduty-critical'
          repeat_interval: 10m

    receivers:
      - name: 'slack-notifications'
        slack_configs:
          - channel: '#mlops-alerts'
            send_resolved: true
            title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}'
            title_link: '{{ .CommonAnnotations.dashboard_url }}'
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Severity:* {{ .Labels.severity }}
              *Namespace:* {{ .Labels.namespace }}
              *Runbook:* {{ .Annotations.runbook_url }}
              {{ end }}
            footer: 'MLOps Platform - {{ .GroupLabels.severity }}'
            color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

      - name: 'slack-mlops'
        slack_configs:
          - channel: '#mlops-drift-alerts'
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .GroupLabels.category }} - {{ .GroupLabels.alertname }}'
            text: |
              {{ range .Alerts }}
              *Model:* {{ .Labels.model_name }}
              *Version:* {{ .Labels.model_version }}
              *Alert:* {{ .Annotations.summary }}
              *Details:* {{ .Annotations.description }}
              *Drift Score:* {{ .Value }}
              {{ end }}
            footer: 'ML Monitoring'
            color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'

      - name: 'pagerduty-critical'
        pagerduty_configs:
          - routing_key: "${PAGERDUTY_ROUTING_KEY}"
            severity: critical
            description: '{{ .CommonAnnotations.description }}'
            client: 'MLOps Platform Monitoring'
            client_url: '{{ .CommonAnnotations.dashboard_url }}'
            details:
              firing: '{{ .Alerts.Firing | len }}'
              resolved: '{{ .Alerts.Resolved | len }}'
              runbook: '{{ .CommonAnnotations.runbook_url }}'

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace']
      - source_match:
          alertname: 'MonitoringServiceDown'
        target_match_re:
          alertname: '.*'
        equal: ['namespace']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-templates
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: alerting
data:
  default.tmpl: |
    {{ define "slack.default.text" }}
    {{ range .Alerts }}
    *Alert:* {{ .Annotations.summary }} on {{ .Labels.instance }}
    *Severity:* {{ .Labels.severity }}
    *Description:* {{ .Annotations.description }}
    *Runbook:* {{ .Annotations.runbook_url }}
    {{ end }}
    {{ end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: alerting
    app.kubernetes.io/part-of: mlops-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
        app.kubernetes.io/component: alerting
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9093"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: monitoring-serviceaccount
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: alertmanager
                topologyKey: kubernetes.io/hostname
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.26.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
            - --cluster.listen-address=0.0.0.0:9094
            - --cluster.peer=alertmanager:9094
            - --data.retention=120h
            - --web.external-url=http://alertmanager.monitoring:9093
            - --log.level=info
          ports:
            - name: web
              containerPort: 9093
              protocol: TCP
            - name: cluster-tcp
              containerPort: 9094
              protocol: TCP
            - name: cluster-udp
              containerPort: 9094
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
            - name: templates
              mountPath: /etc/alertmanager/templates
            - name: storage
              mountPath: /alertmanager
          env:
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: alertmanager-secrets
                  key: slack-webhook-url
                  optional: true
            - name: PAGERDUTY_ROUTING_KEY
              valueFrom:
                secretKeyRef:
                  name: alertmanager-secrets
                  key: pagerduty-routing-key
                  optional: true
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: web
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/ready
              port: web
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: templates
          configMap:
            name: alertmanager-templates
        - name: storage
          persistentVolumeClaim:
            claimName: alertmanager-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-pvc
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: gp3
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: alerting
spec:
  type: ClusterIP
  ports:
    - name: web
      port: 9093
      targetPort: 9093
      protocol: TCP
    - name: cluster-tcp
      port: 9094
      targetPort: 9094
      protocol: TCP
    - name: cluster-udp
      port: 9094
      targetPort: 9094
      protocol: UDP
  selector:
    app.kubernetes.io/name: alertmanager
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mlops-platform-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: alerting
    release: prometheus
spec:
  groups:
    - name: mlflow.rules
      rules:
        - alert: MLflowDown
          expr: up{job="mlflow-server"} == 0
          for: 2m
          labels:
            severity: critical
            category: infrastructure
          annotations:
            summary: "MLflow server is down"
            description: "MLflow has been unreachable for more than 2 minutes."
            runbook_url: "https://docs.example.com/runbooks/mlflow-down"
            dashboard_url: "https://grafana.example.com/d/mlflow-dashboard"

        - alert: MLflowHighLatency
          expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="mlflow-server"}[5m])) > 2
          for: 5m
          labels:
            severity: warning
            category: infrastructure
          annotations:
            summary: "MLflow high latency detected"
            description: "95th percentile latency is above 2 seconds."
            runbook_url: "https://docs.example.com/runbooks/mlflow-latency"
            dashboard_url: "https://grafana.example.com/d/mlflow-dashboard"

        - alert: MLflowHighErrorRate
          expr: rate(http_requests_total{job="mlflow-server", status=~"5.."}[5m]) / rate(http_requests_total{job="mlflow-server"}[5m]) > 0.05
          for: 5m
          labels:
            severity: critical
            category: infrastructure
          annotations:
            summary: "MLflow high error rate"
            description: "More than 5% of MLflow requests are returning 5xx errors."
            runbook_url: "https://docs.example.com/runbooks/mlflow-errors"

    - name: postgresql.rules
      rules:
        - alert: PostgreSQLDown
          expr: up{job="mlflow-postgresql"} == 0
          for: 1m
          labels:
            severity: critical
            category: infrastructure
          annotations:
            summary: "PostgreSQL is down"
            description: "PostgreSQL has been unreachable for more than 1 minute."
            runbook_url: "https://docs.example.com/runbooks/postgres-down"

        - alert: PostgreSQLHighConnections
          expr: pg_stat_activity_count{datname="mlflow"} > 80
          for: 5m
          labels:
            severity: warning
            category: infrastructure
          annotations:
            summary: "PostgreSQL high connection count"
            description: "More than 80 active connections to MLflow database."
            runbook_url: "https://docs.example.com/runbooks/postgres-connections"

        - alert: PostgreSQLReplicationLag
          expr: pg_stat_replication_flush_lag_seconds > 30
          for: 5m
          labels:
            severity: warning
            category: infrastructure
          annotations:
            summary: "PostgreSQL replication lag"
            description: "Replication lag is above 30 seconds."

    - name: kserve.rules
      rules:
        - alert: KServeControllerDown
          expr: up{job="kserve-controller"} == 0
          for: 3m
          labels:
            severity: critical
            category: infrastructure
          annotations:
            summary: "KServe controller is down"
            description: "KServe controller has been unreachable for more than 3 minutes."
            runbook_url: "https://docs.example.com/runbooks/kserve-down"

        - alert: InferenceServiceDown
          expr: kserve_inference_service_status{status="False"} == 1
          for: 3m
          labels:
            severity: critical
            category: ml_serving
          annotations:
            summary: "InferenceService {{ $labels.service }} is down"
            description: "InferenceService {{ $labels.service }} in namespace {{ $labels.namespace }} is not ready."

        - alert: KServeHighErrorRate
          expr: rate(http_requests_total{job="kserve", status=~"5.."}[5m]) / rate(http_requests_total{job="kserve"}[5m]) > 0.05
          for: 5m
          labels:
            severity: critical
            category: ml_serving
          annotations:
            summary: "KServe high error rate"
            description: "More than 5% of inference requests are failing."
            runbook_url: "https://docs.example.com/runbooks/kserve-errors"
            dashboard_url: "https://grafana.example.com/d/kserve-dashboard"

        - alert: InferenceServiceHighLatency
          expr: histogram_quantile(0.95, rate(kserve_inference_duration_seconds_bucket[5m])) > 5
          for: 10m
          labels:
            severity: warning
            category: ml_serving
          annotations:
            summary: "Inference high latency"
            description: "95th percentile inference latency is above 5 seconds for model {{ $labels.model_name }}."

    - name: drift.rules
      rules:
        - alert: ModelDriftDetected
          expr: ml_data_drift_detected == 1
          for: 5m
          labels:
            severity: warning
            category: ml_monitoring
          annotations:
            summary: "Data drift detected for model {{ $labels.model_name }}"
            description: "Model {{ $labels.model_name }} (v{{ $labels.model_version }}) has drift share of {{ $value }}."

        - alert: ModelRetrainingRequired
          expr: ml_data_drift_share > 0.3 or ml_model_accuracy < 0.7
          for: 10m
          labels:
            severity: warning
            category: ml_monitoring
          annotations:
            summary: "Model retraining recommended for {{ $labels.model_name }}"
            description: "Either drift share > 30% or accuracy < 70%. Trigger auto-retraining pipeline."

    - name: kubernetes.rules
      rules:
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
          for: 5m
          labels:
            severity: warning
            category: kubernetes
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value }} times in 15 minutes."

        - alert: PodPendingLong
          expr: kube_pod_status_phase{phase="Pending"} == 1
          for: 15m
          labels:
            severity: warning
            category: kubernetes
          annotations:
            summary: "Pod {{ $labels.pod }} stuck in Pending"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been pending for more than 15 minutes."

        - alert: NodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure", status="true"} == 1
          for: 5m
          labels:
            severity: critical
            category: kubernetes
          annotations:
            summary: "Node {{ $labels.node }} has disk pressure"
            description: "Disk usage on node {{ $labels.node }} is critically high."
