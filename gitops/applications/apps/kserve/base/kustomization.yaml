apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - crds.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - configmap.yaml
  - storage-config.yaml
  - cert-manager.yaml
  - webhook.yaml
  - controller-deployment.yaml
  - service.yaml
  - serving-runtime.yaml
  - serving-runtimes/sklearn-runtime.yaml
  - serving-runtimes/pytorch-runtime.yaml
  - serving-runtimes/tensorflow-runtime.yaml
  - monitoring.yaml
  - network-policy.yaml
  - istio-config.yaml

labels:
  - pairs:
      app.kubernetes.io/name: kserve
      app.kubernetes.io/component: model-serving
      app.kubernetes.io/part-of: mlops-platform
    includeSelectors: false
