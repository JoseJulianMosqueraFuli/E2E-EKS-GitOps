apiVersion: v1
kind: Namespace
metadata:
  name: litmus
  labels:
    app.kubernetes.io/name: litmus
    app.kubernetes.io/component: chaos-engineering
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: litmuschaos
  namespace: litmus
spec:
  interval: 1h
  url: https://litmuschaos.github.io/litmus-helm/
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: litmus
  namespace: litmus
spec:
  interval: 1h
  chart:
    spec:
      chart: litmus
      version: "3.16.x"
      sourceRef:
        kind: HelmRepository
        name: litmuschaos
        namespace: litmus
  values:
    portal:
      server:
        # Disable the portal UI by default; use kubectl/Argo Workflows to run experiments.
        enabled: false
    # Scope to the litmus namespace by default.
    mongodb:
      enabled: true
      persistence:
        enabled: true
        size: 8Gi
    # Minimal agent for dev/staging.
    agent:
      enabled: true
      selfDeployer: true
