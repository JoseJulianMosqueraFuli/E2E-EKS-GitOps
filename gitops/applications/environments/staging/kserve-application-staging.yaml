apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kserve-application-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: kserve
    app.kubernetes.io/component: model-serving
    app.kubernetes.io/part-of: mlops-platform
    environment: staging
  annotations:
    argocd.argoproj.io/tracking-method: annotation+label
    notifications.argoproj.io/subscribe.on-sync-failed.slack: mlops-alerts-dev
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: mlops-core
  source:
    repoURL: https://github.com/org/gitops-applications
    targetRevision: staging
    path: apps/kserve-application/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: kserve
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
