apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Single source of truth is in gitops/applications/apps/kserve/base/
resources:
  - ../../../gitops/applications/apps/kserve/base

labels:
  - pairs:
      app.kubernetes.io/name: kserve
      app.kubernetes.io/instance: mlops-kserve
      app.kubernetes.io/version: "v0.11.0"
      app.kubernetes.io/component: model-serving
      app.kubernetes.io/part-of: mlops-platform
    includeSelectors: true

images:
  - name: kserve/kserve-controller
    newTag: v0.11.0
  - name: kserve/sklearnserver
    newTag: v0.11.0
  - name: kserve/torchserve
    newTag: 0.7.0
  - name: tensorflow/serving
    newTag: 2.6.2

configMapGenerator:
  - name: kserve-environment-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - KSERVE_VERSION=v0.11.0
      - DEFAULT_DEPLOYMENT_MODE=Serverless

patchesStrategicMerge: []

patchesJson6902:
  - target:
      group: admissionregistration.k8s.io
      version: v1
      kind: MutatingAdmissionWebhook
      name: inferenceservice.serving.kserve.io
    patch: |-
      - op: add
        path: /clientConfig/caBundle
        value: ""
  - target:
      group: admissionregistration.k8s.io
      version: v1
      kind: ValidatingAdmissionWebhook
      name: inferenceservice.serving.kserve.io
    patch: |-
      - op: add
        path: /clientConfig/caBundle
        value: ""

replicas:
  - name: kserve-controller-manager
    count: 1
