apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ------------------------------------------------------------------------------
# SOURCE OF TRUTH
# The base MLflow manifests (server, database, minio, external-secrets, etc.)
# live in gitops/applications/apps/mlflow/base/ and are maintained there.
# This overlay adds operational resources (HPA, PDB, network-policy, etc.)
# ------------------------------------------------------------------------------

resources:
  - ../../../gitops/applications/apps/mlflow/base
  - network-policy.yaml
  - hpa.yaml
  - pod-disruption-budget.yaml
  - monitoring.yaml
  - backup-cronjob.yaml

commonLabels:
  app.kubernetes.io/name: mlflow
  app.kubernetes.io/instance: mlops-mlflow
  app.kubernetes.io/version: "2.14.3"
  app.kubernetes.io/component: ml-platform
  app.kubernetes.io/part-of: mlops-platform

# Pin the MLflow image to the version matching requirements.txt
images:
  - name: ghcr.io/mlflow/mlflow
    newTag: "v2.14.3"

configMapGenerator:
  - name: mlflow-environment-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - MLFLOW_VERSION=2.14.3
