apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Single source of truth is in gitops/applications/apps/mlflow/base/
resources:
  - ../../../gitops/applications/apps/mlflow/base

labels:
  - pairs:
      app.kubernetes.io/name: mlflow
      app.kubernetes.io/instance: mlops-mlflow
      app.kubernetes.io/version: "2.14.3"
      app.kubernetes.io/component: ml-platform
      app.kubernetes.io/part-of: mlops-platform
    includeSelectors: true

images:
  - name: ghcr.io/mlflow/mlflow
    newTag: "v2.14.3"

configMapGenerator:
  - name: mlflow-environment-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - MLFLOW_VERSION=2.14.3
