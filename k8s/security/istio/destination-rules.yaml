  name: kserve-mtls
  namespace: kserve
  labels:
    app.kubernetes.io/name: kserve
    app.kubernetes.io/component: security
spec:
  host: "*.kserve.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
