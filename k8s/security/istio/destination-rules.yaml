# DestinationRules enforce TLS settings for outbound traffic within the mesh.
# These ensure that even cross-namespace calls between MLOps services use mTLS.

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: mlflow-mtls
  namespace: mlflow
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/component: security
spec:
  host: "*.mlflow.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL

---
apiVersion: networking.istio.io/v1beta1
