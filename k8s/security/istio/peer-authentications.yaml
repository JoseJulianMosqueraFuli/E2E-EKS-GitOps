# PeerAuthentication resources enforce STRICT mTLS within MLOps namespaces.
# All pod-to-pod traffic must be encrypted with mutual TLS.
# Apply after Istio control plane and sidecar injection are configured.

---
# MLflow namespace: strict mTLS for all workloads
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: mlflow-strict-mtls
  namespace: mlflow
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/component: security
spec:
  mtls:
    mode: STRICT

