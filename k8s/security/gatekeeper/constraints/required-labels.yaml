# Gatekeeper Constraints: Required Labels on MLOps resources.
# Apply AFTER the ConstraintTemplate is deployed.

---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredLabels
metadata:
  name: mlops-required-labels
  labels:
    app.kubernetes.io/name: gatekeeper
    app.kubernetes.io/component: policy
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
      - apiGroups: [""]
        kinds: ["Pod", "Service"]
    namespaces:
      - "mlflow"
      - "kserve"
      - "monitoring"
      - "kubeflow"
      - "feast"
  parameters:
    labels:
      - app.kubernetes.io/name
      - app.kubernetes.io/component
      - app.kubernetes.io/part-of

---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredLabels
metadata:
  name: gitops-required-labels
  labels:
    app.kubernetes.io/name: gatekeeper
    app.kubernetes.io/component: policy
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet"]
    namespaces:
      - "argocd"
      - "flux-system"
      - "gatekeeper-system"
  parameters:
    labels:
      - app.kubernetes.io/name
      - app.kubernetes.io/component
