# Gatekeeper Constraints: Ingress Host Whitelist.
# Restricts Ingress hosts to approved domains for MLOps services.

---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sIngressHosts
metadata:
  name: mlops-ingress-hosts
  labels:
    app.kubernetes.io/name: gatekeeper
    app.kubernetes.io/component: policy
spec:
  match:
    kinds:
      - apiGroups: ["networking.k8s.io"]
        kinds: ["Ingress"]
    namespaces:
      - "mlflow"
      - "kserve"
      - "monitoring"
      - "argocd"
  parameters:
    allowedHosts:
      - "mlflow.example.com"
      - "kserve.example.com"
      - "grafana.example.com"
      - "argocd.example.com"
      - "*.example.com"
