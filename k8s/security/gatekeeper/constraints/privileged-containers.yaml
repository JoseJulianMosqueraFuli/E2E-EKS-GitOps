# Gatekeeper Constraints: Block Privileged Containers.
# Prevents pods from running with elevated host privileges.

---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sBlockPrivileged
metadata:
  name: mlops-block-privileged
  labels:
    app.kubernetes.io/name: gatekeeper
    app.kubernetes.io/component: policy
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet", "ReplicaSet"]
    namespaces:
      - "mlflow"
      - "kserve"
      - "monitoring"
      - "kubeflow"
      - "feast"
      - "argocd"
      - "argo-workflows"
