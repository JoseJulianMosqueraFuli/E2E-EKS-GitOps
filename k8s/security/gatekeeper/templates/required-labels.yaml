# Gatekeeper ConstraintTemplate: K8sRequiredLabels
# Ensures that all resources in MLOps namespaces have mandatory labels.

apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredlabels
  labels:
    app.kubernetes.io/name: gatekeeper
    app.kubernetes.io/component: policy-template
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredLabels
      validation:
        openAPIV3Schema:
          type: object
          properties:
            labels:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredlabels

        violation[{"msg": msg}] {
          required := input.parameters.labels[_]
          not label_exists(input.review.object.metadata.labels, required)
          msg := sprintf("Resource must have required label: %s", [required])
        }

        label_exists(labels, key) {
          labels[key]
        }
